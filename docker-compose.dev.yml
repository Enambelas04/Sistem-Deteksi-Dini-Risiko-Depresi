services:
  backend:
    build:
      context: ./backend
    container_name: aurelia-backend-dev
    command: python app.py
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aurelia-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
    depends_on:
      - backend
