services:
  n8n:
    image: n8nio/n8n:latest
    container_name: aurelia-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n-data:/home/node/.n8n

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: aurelia-libretranslate
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      - LT_LOAD_ONLY=en,id
    volumes:
      - libretranslate-models:/home/libretranslate/.local

  backend:
    build:
      context: ./backend
    container_name: aurelia-backend
    restart: unless-stopped
    ports:
      - "5060:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - backend-data:/app/data
    depends_on:
      - libretranslate

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurelia-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  libretranslate-models:
  n8n-data:
  backend-data:
