services:
  backend:
    build:
      context: ./backend
    container_name: aurelia-backend
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      - FLASK_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurelia-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
